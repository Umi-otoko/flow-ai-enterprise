name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type-check, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        # postinstall runs `wxt prepare`, generating .wxt/tsconfig.json
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Lint (zero warnings policy)
        run: npm run lint

      - name: Build extension
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: extension-build-${{ github.sha }}
          path: .output/chrome-mv3/
          retention-days: 14
