name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Type-check, Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        # npm install (not ci) — no package-lock.json in repo yet.
        run: npm install

      - name: Prepare WXT types
        # Generates .wxt/tsconfig.json and .wxt/types/imports.d.ts so that
        # defineBackground / defineContentScript are visible to tsc.
        run: npx wxt prepare

      - name: Type check
        run: npm run compile

      - name: Lint (zero warnings policy)
        run: npm run lint

      - name: Build extension
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: extension-build-${{ github.sha }}
          path: .output/chrome-mv3/
          retention-days: 14
